        <h1 id="博客分享"><a href="#博客分享" class="headerlink" title="博客分享"></a>博客分享</h1><h2 id="DOM"><a href="#DOM" class="headerlink" title="DOM"></a>DOM</h2><p>DOM是js中的一组对象，可以访问DOM中的所有属性，DOM中的一切都被视为节点node</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">//在body末尾添加元素:creatElement</span></span><br><span class="line"><span class="comment">//child是用来添加子节点</span></span><br><span class="line"><span class="keyword">let</span> olElement=<span class="variable language_">document</span>.<span class="title function_">createElement</span>(<span class="string">&#x27;ol&#x27;</span>);</span><br><span class="line"><span class="variable language_">document</span>.<span class="property">body</span>.<span class="title function_">appendChild</span>(olElement);</span><br></pre></td></tr></table></figure>
